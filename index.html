<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiyaa Studio</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Arial, sans-serif;
}

h1 {
  padding: 20px;
}

.section {
  padding: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.grid img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  display: block;
}
</style>
</head>

<body>

<h1>SEIYAA STUDIO</h1>

<div class="section">
  <h2>Market Series</h2>
  <div class="grid">
    <img src="./images/_DSC8261.jpg">
    <img src="./images/_DSC8267.jpg">
    <img src="./images/_DSC7867.jpg">
    <img src="./images/_DSC7886.jpg">
  </div>
</div>

<div class="section">
  <h2>Street / Gas Station</h2>
  <div class="grid">
    <img src="./images/_DSC8303.jpg">
    <img src="./images/_DSC8330.jpg">
    <img src="./images/_DSC7851.jpg">
    <img src="./images/_DSC7860.jpg">
  </div>
</div>

</body>
</html>
