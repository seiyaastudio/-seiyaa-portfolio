<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seiyaa Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#050505;
color:#fff;
font-family:'Inter';
line-height:1.6;
}

/* NAV */
.nav{
position:fixed;
width:100%;
padding:25px 8%;
display:flex;
justify-content:space-between;
z-index:1000;
background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
}

.logo{font-family:'Playfair Display';letter-spacing:3px;}

.nav a{
color:#aaa;text-decoration:none;margin-left:30px;
}
.nav a:hover{color:#fff}

/* HERO */
.hero{height:100vh;position:relative;overflow:hidden;}
.hero img{
position:absolute;width:100%;height:100%;
object-fit:cover;opacity:0;transition:opacity 1.5s ease;
}
.hero img.active{opacity:1}

/* SECTION */
.section{padding:120px 8%;}
.section h2{font-family:'Playfair Display';font-size:34px;margin-bottom:20px;}
.section p{color:#bbb;max-width:700px;margin-bottom:40px;}

/* CINEMATIC */
.cinematic{display:grid;grid-template-columns:2fr 1fr;gap:30px;}
.cinematic.reverse{grid-template-columns:1fr 2fr;}
.cinematic-main img,
.cinematic-side img{
width:100%;height:100%;object-fit:cover;border-radius:12px;cursor:pointer;
}
.cinematic-side{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

@media(max-width:768px){
.cinematic{grid-template-columns:1fr;}
}

/* FUNNEL PROCESS */
.process{display:flex;flex-direction:column;align-items:center;gap:20px;}
.process div{
background:#0a0a0a;border:1px solid #222;padding:20px;border-radius:10px;
text-align:center;transition:.3s;
}
.process div:hover{transform:translateY(-5px);border-color:#444;}
.process div:nth-child(1){width:100%}
.process div:nth-child(2){width:85%}
.process div:nth-child(3){width:70%}
.process div:nth-child(4){width:55%}

/* LIGHTBOX */
.lightbox{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,.95);
display:none;justify-content:center;align-items:center;
z-index:2000;overflow:hidden;
}

.lightbox img{
position:absolute;
border-radius:12px;
transition:all .5s cubic-bezier(0.22,1,0.36,1);
}

/* SCROLL */
.fade{opacity:0;transform:translateY(40px);transition:1s;}
.fade.show{opacity:1;transform:translateY(0);}

/* AI CHAT */
.chat-btn{
position:fixed;bottom:30px;right:30px;
background:#fff;color:#000;padding:12px 18px;
border-radius:30px;cursor:pointer;z-index:999;
}

.chat-box{
position:fixed;bottom:90px;right:30px;
width:300px;height:400px;background:#111;
border:1px solid #333;display:none;
flex-direction:column;
}

.chat-messages{flex:1;padding:10px;overflow-y:auto;font-size:14px;}
.chat-input{display:flex;border-top:1px solid #333;}
.chat-input input{flex:1;background:none;border:none;color:#fff;padding:10px;}
.chat-input button{background:#fff;border:none;padding:10px;}

/* MUSIC */
.music-btn{
position:fixed;bottom:30px;left:30px;
background:#fff;color:#000;padding:10px;border-radius:50%;
cursor:pointer;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo">SEIYAA STUDIO</div>
<div>

<div class="cinematic-side">

<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* HERO */
let slides=document.querySelectorAll(".hero img");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},4000);

/* SCROLL */
const faders=document.querySelectorAll(".fade");
window.addEventListener("scroll",()=>{
faders.forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-100){
el.classList.add("show");
}
});
});
window.dispatchEvent(new Event('scroll'));

/* LIGHTBOX + SWIPE */
const imgs=document.querySelectorAll(".cinematic img");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

let currentIndex=0;
let gallery=[];

imgs.forEach((img,i)=>{
img.onclick=()=>{
gallery=[...img.closest('.cinematic').querySelectorAll('img')];
currentIndex=gallery.indexOf(img);

openLightbox(img);
};
});

function openLightbox(img){
const rect=img.getBoundingClientRect();
lightbox.style.display="flex";
lightboxImg.src=img.src;

lightboxImg.style.top=rect.top+"px";
lightboxImg.style.left=rect.left+"px";
lightboxImg.style.width=rect.width+"px";
lightboxImg.style.height=rect.height+"px";

requestAnimationFrame(()=>{
lightboxImg.style.top="50%";
lightboxImg.style.left="50%";
lightboxImg.style.width="80vw";
lightboxImg.style.height="80vh";
lightboxImg.style.transform="translate(-50%,-50%)";
});
}

lightbox.onclick=()=>lightbox.style.display="none";

/* SWIPE */
let startX=0;

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(endX<startX-50){
currentIndex=(currentIndex+1)%gallery.length;
}
if(endX>startX+50){
currentIndex=(currentIndex-1+gallery.length)%gallery.length;
}

lightboxImg.src=gallery[currentIndex].src;
});

/* AI */
function toggleChat(){
let chat=document.getElementById("chat");
chat.style.display=chat.style.display==="flex"?"none":"flex";
}

function sendMsg(){
let input=document.getElementById("chatInput");
let box=document.getElementById("chatMessages");

box.innerHTML+=`<div>> ${input.value}</div>`;
box.innerHTML+=`<div style="color:#aaa;">AI: DM us for bookings.</div>`;

input.value="";
}

/* MUSIC */
let music=document.getElementById("bgMusic");
function toggleMusic(){
music.paused?music.play():music.pause();
}

</script>

</body>
</html>
