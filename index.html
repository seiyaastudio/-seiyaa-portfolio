<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiyaa Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0a0a;
  color: white;
  font-family: 'Inter', sans-serif;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 25px 60px;
  display: flex;
  justify-content: space-between;
  z-index: 100;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}

nav h1 {
  font-family: 'Playfair Display', serif;
  letter-spacing: 2px;
}

nav a {
  color: white;
  margin-left: 30px;
  text-decoration: none;
  opacity: 0.7;
}

nav a:hover {
  opacity: 1;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('images/dsc7851.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  padding: 0 80px;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, #0a0a0a 10%, transparent 60%);
}

.hero-content {
  position: relative;
  z-index: 2;
}

.hero h2 {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
}

.hero p {
  opacity: 0.7;
  margin-top: 10px;
}

/* SECTIONS */
.section {
  padding: 100px 80px;
}

.section h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 30px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.grid img {
  width: 100%;
  height: 340px;
  object-fit: cover;
  border-radius: 14px;
  transition: 0.4s ease;
}

.grid img:hover {
  transform: scale(1.05);
}

</style>
</head>

<body>

<nav>
  <h1>SEIYAA STUDIO</h1>
  <div>
    <a href="#market">Market</a>
    <a href="#street">Street</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h2>Cinematic Photography</h2>
    <p>Visual storytelling through light and street culture</p>
  </div>
</section>

<!-- FEATURED -->
<section class="section">
  <h2>Featured</h2>
  <div class="grid">
    <img src="images/dsc8255.jpg">
    <img src="images/dsc8261.jpg">
    <img src="images/dsc8267.jpg">
  </div>
</section>

<!-- MARKET -->
<section class="section" id="market">
  <h2>Market Series</h2>
  <div class="grid">
    <img src="images/dsc8255.jpg">
    <img src="images/dsc8261.jpg">
    <img src="images/dsc8267.jpg">
    <img src="images/dsc7867.jpg">
  </div>
</section>

<!-- STREET -->
<section class="section" id="street">
  <h2>Street / Gas Station</h2>
  <div class="grid">
    <img src="images/dsc8303.jpg">
    <img src="images/dsc8330.jpg">
    <img src="images/dsc7851.jpg">
    <img src="images/dsc7860.jpg">
  </div>
</section>

</body>
</html>
