<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiyaa Studio</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
overflow-x:hidden;
}

/* SECTION BASE */
.section {
height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* HERO */
.hero {
background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover no-repeat;
}

.overlay {
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
}

.hero-text {
position:relative;
z-index:2;
text-align:center;
}

.hero-text h1 {
font-size:80px;
letter-spacing:10px;
}

.hero-text p {
letter-spacing:4px;
color:#aaa;
}

/* BIG TEXT OVERLAY */
.big-text {
position:absolute;
font-size:120px;
font-weight:bold;
opacity:0.08;
}

/* IMAGE SECTION */
.image-section {
background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover no-repeat;
}

/* GALLERY */
.gallery {
display:flex;
gap:20px;
overflow-x:auto;
padding:60px;
}

.gallery img {
height:400px;
border-radius:12px;
transition:0.5s;
}

.gallery img:hover {
transform:scale(1.08);
}

/* TEXT */
.text-block {
max-width:600px;
padding:40px;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="section hero">
<div class="overlay"></div>

<div class="hero-text">
<h1>SEIYAA</h1>
<p>VISUAL STORYTELLER</p>
</div>

</section>

<!-- STORY SECTION -->
<section class="section image-section">
<div class="big-text">VISION</div>

<div class="text-block">
<h2>I build atmosphere.</h2>
<p style="color:#bbb;">
Every frame is intentional. Every light has purpose.
I create visuals that feel cinematic and alive.
</p>
</div>
</section>

<!-- GALLERY -->
<section>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1495567720989-cebdbdd97913">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
</div>
</section>

<!-- CTA -->
<section class="section" style="text-align:center;">
<div>
<h2 style="font-size:40px;">LET’S WORK</h2>
<p style="color:#777;">DM me on Instagram</p>
</div>
</section>

</body>
</html>
