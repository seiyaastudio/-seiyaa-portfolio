<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiyaa Visuals — Eightysix Media</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#fff;font-family:'Inter',sans-serif}

/* PROGRESS */
.progress{position:fixed;top:0;height:3px;width:0;background:#00e0ff;z-index:9999}

/* NAV */
.nav{
position:fixed;width:100%;padding:20px 8%;
display:flex;justify-content:space-between;
background:rgba(0,0,0,.6);backdrop-filter:blur(10px);z-index:1000;
}
.nav a{color:#aaa;margin-left:20px;text-decoration:none}
.nav a.active{color:#fff}

/* HERO */
.hero{height:100vh;position:relative;display:flex;align-items:center;padding:0 8%}
.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.2),#000)}
.hero-content{position:relative;z-index:2}
.hero h1{font-size:80px;font-family:'Playfair Display'}
.hero p{color:#aaa;margin-top:15px}

/* SECTION */
.section{padding:100px 8%}

/* SPLIT */
.split{display:grid;grid-template-columns:1fr 1fr;gap:40px}

/* TYPO */
.big{font-size:60px;font-family:'Playfair Display'}
.small{color:#aaa;margin-top:15px}

/* PORTFOLIO */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.item{
position:relative;
overflow:hidden;
border-radius:12px;
opacity:1;
transform:scale(1);
transition:.4s;
}
.item.hide{
opacity:0;
transform:scale(.9);
pointer-events:none;
}
.item img{width:100%;height:100%;object-fit:cover}

/* FILTER */
.filters{display:flex;gap:10px;margin-bottom:30px}
.filter{padding:8px 16px;border:1px solid #333;cursor:pointer}
.filter.active{background:#fff;color:#000}

/* LIGHTBOX */
.lightbox{
position:fixed;inset:0;background:#000;
display:none;justify-content:center;align-items:center;z-index:2000;
}
.lightbox img{max-width:95%;max-height:95%}

/* CTA */
.cta{text-align:center;padding:120px 8%}
.cta h1{font-size:90px;font-family:'Playfair Display'}

/* CONTACT */
.form{max-width:400px;display:flex;flex-direction:column;gap:10px}
.form input,.form textarea{
background:#000;border:1px solid #333;padding:12px;color:#fff
}
.form button{background:#00e0ff;border:none;padding:12px;cursor:pointer}
.success{display:none;color:#0f0}

/* CHAT */
.chat-btn{
position:fixed;bottom:20px;right:20px;
background:#00e0ff;padding:14px;border-radius:50%;cursor:pointer
}
.chat-box{
position:fixed;bottom:80px;right:20px;width:320px;height:420px;
background:#111;display:none;flex-direction:column;border:1px solid #333
}
.chat-msg{flex:1;overflow-y:auto;padding:10px;font-size:13px}
.chat-input{display:flex}
.chat-input input{flex:1;padding:10px;background:none;border:none;color:#fff}
.chat-input button{background:#00e0ff;border:none;padding:10px}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:42px}
.split{grid-template-columns:1fr}
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="nav">
<div>Eightysix Media</div>
<div>
<a href="#portfolio">Work</a>
<a href="#contact">Contact</a>
</div>
</div>

<!-- HERO -->
<section class="hero">
<img src="images/_DSC8255.jpg">
<div class="hero-content">
<h1>CINEMATIC VISUALS</h1>
<p>By Seiyaa</p>
</div>
</section>

<!-- CONCEPT -->
<section class="section">
<div class="split">
<div>
<div class="big">CONCEPT</div>
<p class="small">Visual storytelling designed for identity and impact.</p>
</div>
<img src="images/_DSC8267.jpg">
</div>
</section>

<!-- PORTFOLIO -->
<section class="section" id="portfolio">
<div class="filters">
<div class="filter active" data="all">All</div>
<div class="filter" data="portrait">Portrait</div>
<div class="filter" data="fashion">Fashion</div>
<div class="filter" data="street">Street</div>
</div>

<div class="grid">
<div class="item portrait"><img src="images/_DSC8255.jpg"></div>
<div class="item fashion"><img src="images/_DSC8261.jpg"></div>
<div class="item street"><img src="images/_DSC8267.jpg"></div>
<div class="item portrait"><img src="images/_DSC8303.jpg"></div>
<div class="item street"><img src="images/_DSC7851.jpg"></div>
<div class="item fashion"><img src="images/_DSC7886.jpg"></div>
</div>
</section>

<!-- CTA -->
<section class="cta">
<h1>LET'S CREATE</h1>
<p class="small">Book your shoot today</p>
</section>

<!-- CONTACT -->
<section class="section" id="contact">
<form class="form" onsubmit="sendMail(event)">
<input id="name" required placeholder="Name">
<input id="email" required type="email" placeholder="Email">
<textarea id="msg" required placeholder="Project"></textarea>
<button>Send</button>
<div class="success" id="success">Opening email...</div>
</form>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<!-- CHAT -->
<div class="chat-btn" onclick="toggleChat()">💬</div>
<div class="chat-box" id="chatBox">
<div class="chat-msg" id="chat"></div>
<div class="chat-input">
<input id="input">
<button onclick="send()">Send</button>
</div>
</div>

<script>

/* PROGRESS */
window.addEventListener("scroll",()=>{
let h=document.documentElement;
progress.style.width=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100+"%";
});

/* NAV ACTIVE */
const links=document.querySelectorAll(".nav a");
window.addEventListener("scroll",()=>{
links.forEach(link=>{
let sec=document.querySelector(link.getAttribute("href"));
if(sec && sec.offsetTop<=scrollY+100){
links.forEach(l=>l.classList.remove("active"));
link.classList.add("active");
}
});
});

/* FILTER */
document.querySelectorAll(".filter").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".filter").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

let val=btn.getAttribute("data");

document.querySelectorAll(".item").forEach(el=>{
el.classList.toggle("hide",!(val==="all"||el.classList.contains(val)));
});
};
});

/* LIGHTBOX FIX */
document.querySelectorAll(".item img").forEach(img=>{
img.onclick=()=>{
lightbox.style.display="flex";
lightboxImg.src=img.src;
};
});
lightbox.onclick=()=>lightbox.style.display="none";

/* EMAIL */
function sendMail(e){
e.preventDefault();
success.style.display="block";
window.location.href=`mailto:rainiercasas28@gmail.com`;
}

/* CHAT UPGRADE */
function toggleChat(){
chatBox.style.display=chatBox.style.display==="flex"?"none":"flex";
}

function send(){
let msg=input.value.toLowerCase();
if(!msg)return;
chat.innerHTML+=`<div>> ${msg}</div>`;
let r="Tell me more about your project.";
if(msg.includes("price")) r="Pricing ranges ₱3k–₱15k.";
if(msg.includes("book")) r="Use contact form below.";
if(msg.includes("service")) r="Portrait, fashion, cinematic.";
chat.innerHTML+=`<div style="color:#aaa;">AI: ${r}</div>`;
input.value="";
chat.scrollTop=9999;
}

</script>

</body>
</html>
