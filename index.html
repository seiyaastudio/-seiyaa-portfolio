<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seiyaa Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 25px 60px;
  display: flex;
  justify-content: space-between;
  z-index: 1000;
  transition: 0.3s;
}

nav.scrolled {
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
}

nav a {
  color: white;
  margin-left: 30px;
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 1px;
}

/* HERO */
.hero {
  height: 100vh;
  background: 
    linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9)),
    url('images/_DSC8255.jpg') center/cover no-repeat;
  display: flex;
  align-items: flex-end;
  padding: 80px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 72px;
  line-height: 1.1;
}

.hero p {
  margin-top: 10px;
  color: #ccc;
  font-size: 14px;
}

/* SECTION */
.section {
  padding: 120px 80px;
}

.section h2 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  margin-bottom: 40px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.grid img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
  transition: 0.4s ease;
  filter: brightness(0.95);
}

.grid img:hover {
  transform: scale(1.03);
  filter: brightness(1.1);
}

/* FADE IN */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}

/* FOOTER */
.footer {
  padding: 80px;
  text-align: center;
  color: #777;
  font-size: 13px;
}

</style>
</head>

<body>

<nav id="nav">
  <div><b>SEIYAA STUDIO</b></div>
  <div>
    <a href="#">Home</a>
    <a href="#market">Market</a>
    <a href="#street">Street</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Visual Storytelling</h1>
    <p>Cinematic Photography • Editorial • Street</p>
  </div>
</section>

<!-- MARKET -->
<section class="section fade" id="market">
  <h2>Market Series</h2>
  <div class="grid">
    <img src="images/_DSC8261.jpg">
    <img src="images/_DSC8267.jpg">
    <img src="images/_DSC7867.jpg">
    <img src="images/_DSC7886.jpg">
  </div>
</section>

<!-- STREET -->
<section class="section fade" id="street">
  <h2>Street / Gas Station</h2>
  <div class="grid">
    <img src="images/_DSC8303.jpg">
    <img src="images/_DSC8330.jpg">
    <img src="images/_DSC7851.jpg">
    <img src="images/_DSC7860.jpg">
  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<!-- FOOTER -->
<div class="footer">
  © Seiyaa Studio — Visual Storytelling
</div>

<script>

/* NAV SCROLL EFFECT */
window.addEventListener("scroll", () => {
  document.getElementById("nav").classList.toggle("scrolled", window.scrollY > 50);
});

/* FADE IN ON SCROLL */
const faders = document.querySelectorAll(".fade");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

faders.forEach(el => observer.observe(el));

/* LIGHTBOX */
const images = document.querySelectorAll(".grid img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

lightbox.addEventListener("click", () => {
  lightbox.style.display = "none";
});

</script>

</body>
</html>
