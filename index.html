<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eightysix Media — Seiyaa Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#020611;
--accent:#00cfff;
--text:#ffffff;
--muted:#8aa3b8;
--glass:rgba(255,255,255,0.05);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#020611,#041a2d);
color:#fff;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* SCROLL BAR */
.progress{
position:fixed;
top:0;
left:0;
height:3px;
background:linear-gradient(90deg,#00cfff,#fff);
width:0%;
z-index:9999;
}

/* NAV */
.nav{
position:fixed;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,.4);
backdrop-filter:blur(12px);
z-index:1000;
}
.nav a{color:#aaa;margin-left:25px;text-decoration:none}
.nav a:hover{color:#fff}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
padding:0 8%;
position:relative;
}
.hero::before{
content:"";
position:absolute;
inset:0;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;
opacity:.25;
}
.hero h1{
font-family:'Playfair Display';
font-size:64px;
}
.hero p{color:var(--muted);margin:20px 0}
.btn{
border:1px solid #fff;
padding:12px 28px;
text-decoration:none;
color:#fff;
}
.btn:hover{background:#fff;color:#000}

/* SECTIONS */
.section{padding:120px 8%}
.section h2{
font-family:'Playfair Display';
font-size:36px;
margin-bottom:20px;
}

/* PORTFOLIO */
.filters{
display:flex;
gap:10px;
margin-bottom:30px;
}
.filters button{
background:none;
border:1px solid #555;
color:#aaa;
padding:6px 14px;
cursor:pointer;
}
.filters button.active{background:#fff;color:#000}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.item{
aspect-ratio:4/5;
overflow:hidden;
border-radius:14px;
cursor:pointer;
position:relative;
}
.item img{
width:100%;
height:100%;
object-fit:cover;
transition:.6s;
}
.item:hover img{transform:scale(1.1)}

.hide{display:none}

/* LIGHTBOX */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}
.lightbox img{
max-width:95%;
max-height:95%;
object-fit:contain;
}

/* CTA */
.cta{
text-align:center;
padding:100px 8%;
background:linear-gradient(180deg,#041a2d,#000);
}
.cta h2{font-size:40px;margin-bottom:20px}

/* FORM */
.form{
max-width:400px;
display:flex;
flex-direction:column;
gap:10px;
}
.form input,.form textarea{
padding:12px;
background:#000;
border:1px solid #333;
color:#fff;
}
.form button{
padding:12px;
background:#00cfff;
border:none;
cursor:pointer;
}
.success{display:none;color:#0f0}

/* CHAT */
.chat-btn{
position:fixed;
bottom:20px;
right:20px;
background:#00cfff;
padding:14px;
border-radius:50%;
cursor:pointer;
}
.chat{
position:fixed;
bottom:80px;
right:20px;
width:300px;
height:400px;
background:#111;
display:none;
flex-direction:column;
}
.messages{flex:1;overflow-y:auto;padding:10px}
.quick{display:flex;flex-wrap:wrap;gap:5px;padding:5px}
.quick span{background:#222;padding:5px;border-radius:20px;cursor:pointer;font-size:12px}
.input{display:flex}
.input input{flex:1;background:none;border:none;color:#fff;padding:10px}
.input button{background:#00cfff;border:none;padding:10px}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:42px}
}
</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="nav">
<div><b>EIGHTYSIX MEDIA</b></div>
<div>
<a href="#portfolio">Work</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</div>
</div>

<section class="hero">
<div>
<h1>Cinematic Visual Identity</h1>
<p>Seiyaa — Photographer | Eightysix Media — Studio</p>
<a href="#portfolio" class="btn">View Work</a>
</div>
</section>

<section class="section" id="portfolio">
<h2>Portfolio</h2>

<div class="filters">
<button class="active" data="all">All</button>
<button data="portrait">Portrait</button>
<button data="fashion">Fashion</button>
<button data="street">Street</button>
</div>

<div class="grid">
<div class="item" data="portrait"><img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e"></div>
<div class="item" data="fashion"><img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a0e"></div>
<div class="item" data="street"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"></div>
<div class="item" data="portrait"><img src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04"></div>
</div>
</section>

<section class="cta">
<h2>Book Your Shoot</h2>
<a href="#contact" class="btn">Contact Now</a>
</section>

<section class="section" id="contact">
<h2>Contact</h2>
<form class="form" onsubmit="sendMail(event)">
<input required placeholder="Name" id="name">
<input required placeholder="Email" id="email">
<textarea required placeholder="Project"></textarea>
<button>Send</button>
<div class="success" id="ok">Opening email...</div>
</form>
</section>

<div class="lightbox" id="lightbox"><img id="lightImg"></div>

<div class="chat-btn" onclick="toggleChat()">💬</div>
<div class="chat" id="chat">
<div class="messages" id="msg"></div>
<div class="quick">
<span onclick="ask('pricing')">Pricing</span>
<span onclick="ask('services')">Services</span>
<span onclick="ask('booking')">Booking</span>
</div>
<div class="input">
<input id="input">
<button onclick="send()">Send</button>
</div>
</div>

<script>

/* PROGRESS */
window.onscroll=()=>{
let h=document.documentElement;
let sc=(h.scrollTop)/(h.scrollHeight-h.clientHeight)*100;
document.getElementById("progress").style.width=sc+"%";
}

/* FILTER */
document.querySelectorAll(".filters button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
let f=btn.getAttribute("data");
document.querySelectorAll(".item").forEach(i=>{
i.classList.toggle("hide",f!="all"&&i.getAttribute("data")!=f);
});
}
});

/* LIGHTBOX */
document.querySelectorAll(".item img").forEach(img=>{
img.onclick=()=>{
document.getElementById("lightImg").src=img.src;
document.getElementById("lightbox").style.display="flex";
}
});
document.getElementById("lightbox").onclick=()=>lightbox.style.display="none";

/* MAIL */
function sendMail(e){
e.preventDefault();
window.location.href="mailto:rainiercasas28@gmail.com";
document.getElementById("ok").style.display="block";
}

/* CHAT */
function toggleChat(){
let c=document.getElementById("chat");
c.style.display=c.style.display==="flex"?"none":"flex";
}

function ask(q){
document.getElementById("input").value=q;
send();
}

function send(){
let input=document.getElementById("input");
let text=input.value.toLowerCase();
if(!text)return;

add("You: "+text);

setTimeout(()=>{
let reply="I can help with bookings.";
if(text.includes("price")) reply="Packages start ₱3k.";
if(text.includes("service")) reply="Photography, branding.";
if(text.includes("book")) reply="Use contact form.";
add("AI: "+reply);
},500);

input.value="";
}

function add(t){
let box=document.getElementById("msg");
box.innerHTML+="<div>"+t+"</div>";
box.scrollTop=box.scrollHeight;
}

</script>

</body>
</html>
