<!DOCTYPE html>
<html lang="en">
<head>

<!--
To create a new page:
1. Duplicate this HTML file
2. Rename (e.g. services.html)
3. Update navigation links
-->

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eightysix Media — Seiyaa Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050505;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.12);
--text:#fff;
--muted:#9a9a9a;
--accent:#fff;
--glow:0 0 60px rgba(255,255,255,0.15);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
color:var(--text);
font-family:'Inter',sans-serif;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* CURSOR GRADIENT */
.cursor{
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 70%);
pointer-events:none;
z-index:0;
transform:translate(-50%,-50%);
filter:blur(80px);
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
background:rgba(0,0,0,.6);
backdrop-filter:blur(14px);
}
.logo{font-family:'Playfair Display';letter-spacing:3px}
.nav a{color:var(--muted);margin-left:25px;text-decoration:none;transition:.3s}
.nav a.active,.nav a:hover{color:#fff}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
padding:0 8%;
position:relative;
}
.hero::before{
content:"";
position:absolute;
inset:0;
background:url('images/portrait1.jpg') center/cover;
opacity:.35;
}
.hero-content{position:relative;z-index:2}
.hero h1{font-family:'Playfair Display';font-size:64px}
.hero-words{margin-top:10px;color:var(--muted);letter-spacing:2px}

/* SECTION */
.section{padding:120px 8%}
.section h2{font-family:'Playfair Display';font-size:42px;margin-bottom:30px}

/* BUTTON */
.btn{
padding:12px 24px;
border:1px solid #fff;
transition:.3s;
cursor:pointer;
}
.btn:hover{
background:#fff;
color:#000;
box-shadow:var(--glow);
}

/* FILTER */
.filters{display:flex;gap:10px;margin-bottom:40px;flex-wrap:wrap}
.filter-btn{
padding:10px 18px;
border:1px solid var(--border);
cursor:pointer;
transition:.3s;
font-size:13px;
}
.filter-btn.active{background:#fff;color:#000}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* ITEM */
.item{
position:relative;
border-radius:14px;
overflow:hidden;
aspect-ratio:4/5;
cursor:pointer;
transition:.5s;
opacity:1;
transform:scale(1);
}
.item.featured{
grid-column:span 2;
aspect-ratio:4/3;
}
.item.hide{
opacity:0;
transform:scale(.85);
pointer-events:none;
}
.item img{
width:100%;
height:100%;
object-fit:cover;
transition:.5s;
}
.item:hover img{transform:scale(1.1)}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:12px;
background:linear-gradient(transparent,rgba(0,0,0,.9));
font-size:12px;
letter-spacing:1px;
opacity:0;
transition:.3s;
}
.item:hover .overlay{opacity:1}

/* LIGHTBOX */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:2000;
}
.lightbox.active{
opacity:1;
pointer-events:auto;
}
.lightbox img{
max-width:90%;
max-height:90%;
border-radius:12px;
transform:scale(.9);
transition:.4s;
}
.lightbox.active img{transform:scale(1)}

/* CONTACT */
.form{
display:flex;
flex-direction:column;
gap:12px;
max-width:420px;
}
.form input,.form textarea{
background:#000;
border:1px solid #333;
padding:12px;
color:#fff;
}
.form button{
padding:14px;
background:#fff;
border:none;
cursor:pointer;
}
.success{
display:none;
color:#0f0;
font-size:13px;
}

/* CHAT */
.chat-btn{
position:fixed;
bottom:20px;
right:20px;
background:#fff;
color:#000;
padding:14px;
border-radius:30px;
cursor:pointer;
z-index:999;
}
.chat-box{
position:fixed;
bottom:80px;
right:20px;
width:340px;
height:500px;
background:#111;
border:1px solid #333;
display:none;
flex-direction:column;
z-index:999;
border-radius:12px;
}
.chat-messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}
.msg-user{
align-self:flex-end;
background:#fff;
color:#000;
padding:8px 12px;
border-radius:10px;
}
.msg-bot{
align-self:flex-start;
background:#222;
padding:8px 12px;
border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:40px}
.section{padding:80px 6%}
.item.featured{grid-column:span 1}
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="nav">
<div class="logo">EIGHTYSIX MEDIA</div>
<div>
<a href="#portfolio">Work</a>
<a href="#contact">Contact</a>
</div>
</div>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>Cinematic Visual Identity</h1>
<div class="hero-words" id="heroWords"></div>
</div>
</section>

<!-- PORTFOLIO -->
<section class="section" id="portfolio">
<h2>Portfolio</h2>

<div class="filters">
<div class="filter-btn active" data-filter="all">All</div>
<div class="filter-btn" data-filter="portrait">Portrait</div>
<div class="filter-btn" data-filter="fashion">Fashion</div>
<div class="filter-btn" data-filter="street">Street</div>
<div class="filter-btn" data-filter="creative">Creative</div>
</div>

<!--
To add new images:
1. Copy an existing .item block
2. Update image src
3. Set correct data-cat
-->

<div class="grid" id="grid"></div>
</section>

<!-- CONTACT -->
<section class="section" id="contact">
<h2>Contact</h2>
<form class="form" onsubmit="sendEmail(event)">
<input id="name" required placeholder="Name">
<input id="email" type="email" required placeholder="Email">
<textarea id="msg" required placeholder="Project details"></textarea>
<button type="submit">Send Inquiry</button>
<div class="success" id="success">Opening email...</div>
</form>
</section>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<div class="chat-btn" onclick="toggleChat()">Chat</div>
<div class="chat-box" id="chatBox">
<div class="chat-messages" id="chatMessages"></div>
<div style="display:flex;">
<input id="chatInput" style="flex:1;padding:10px;background:none;border:none;color:#fff">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<script>

/* CURSOR */
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* HERO WORDS */
const words=["CINEMATIC","MOOD","STORY","EDITORIAL","IDENTITY"];
let wi=0;
setInterval(()=>{
heroWords.textContent=words[wi];
wi=(wi+1)%words.length;
},1500);

/* IMAGES (20 EXACT) */
const images=[
["portrait1","portrait"],["portrait2","portrait"],["portrait3","portrait"],["portrait4","portrait"],["portrait5","portrait"],
["fashion1","fashion"],["fashion2","fashion"],["fashion3","fashion"],["fashion4","fashion"],["fashion5","fashion"],
["street1","street"],["street2","street"],["street3","street"],["street4","street"],["street5","street"],
["creative1","creative"],["creative2","creative"],["creative3","creative"],["creative4","creative"],["creative5","creative"]
];

function render(filter="all"){
grid.innerHTML="";
images.forEach((i,index)=>{
let featured = index<2 ? "featured":"";
if(filter!=="all" && i[1]!==filter) return;

grid.innerHTML+=`
<div class="item ${featured}" data-cat="${i[1]}">
<img src="images/${i[0]}.jpg" loading="lazy">
<div class="overlay">${i[1]}</div>
</div>`;
});
}
render();

/* FILTER */
document.querySelectorAll(".filter-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render(btn.dataset.filter);
};
});

/* LIGHTBOX */
document.addEventListener("click",e=>{
if(e.target.tagName==="IMG" && e.target.closest(".item")){
lightbox.classList.add("active");
lightboxImg.src=e.target.src;
}
});
lightbox.onclick=()=>lightbox.classList.remove("active");

/* CONTACT */
function sendEmail(e){
e.preventDefault();
let n=name.value.trim(),em=email.value.trim(),m=msg.value.trim();
if(!n||!em||!m)return;
window.location.href=`mailto:rainiercasas28@gmail.com?subject=${n}&body=${m} (${em})`;
success.style.display="block";
}

/* CHAT */
function toggleChat(){
chatBox.style.display=chatBox.style.display==="flex"?"none":"flex";
if(!chatBox.dataset.init){
bot("Hi 👋 Ask about pricing, services, booking, location, portfolio.");
chatBox.dataset.init=true;
}
}

function sendMsg(){
let msg=chatInput.value.toLowerCase();
if(!msg)return;
user(msg);
setTimeout(()=>reply(msg),300);
chatInput.value="";
}

function user(t){
chatMessages.innerHTML+=`<div class="msg-user">${t}</div>`;
}
function bot(t){
chatMessages.innerHTML+=`<div class="msg-bot">${t}</div>`;
}

function reply(m){
let r="I can help with your inquiry.";
if(m.includes("price")) r="Pricing ranges ₱3k–₱15k depending on project.";
else if(m.includes("service")) r="We offer photography, branding, creative direction.";
else if(m.includes("book")) r="Use the contact form to secure your shoot.";
else if(m.includes("location")) r="We are available nationwide.";
else if(m.includes("portfolio")) r="Scroll above to explore our work.";
else r="Tell me what you need — I’ll guide you.";
bot(r);
}

/* NAV ACTIVE */
const sections=document.querySelectorAll("section");
const navLinks=document.querySelectorAll(".nav a");
window.addEventListener("scroll",()=>{
let current="";
sections.forEach(sec=>{
if(window.scrollY>=sec.offsetTop-200) current=sec.id;
});
navLinks.forEach(a=>{
a.classList.remove("active");
if(a.getAttribute("href")==="#"+current) a.classList.add("active");
});
});

</script>

<!-- NEW SECTION TEMPLATE START -->
<section class="section">
  <h2>New Section</h2>
  <p>Content here</p>
</section>
<!-- NEW SECTION TEMPLATE END -->

</body>
</html>
