<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiyaa Studio</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
overflow-x:hidden;
}

/* SECTION */
.section {
height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* HERO */
.hero {
background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover no-repeat;
}

.overlay {
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
}

.hero-text {
z-index:2;
text-align:center;
}

.hero-text h1 {
font-size:90px;
letter-spacing:12px;
}

.hero-text p {
letter-spacing:5px;
color:#aaa;
}

/* BIG TEXT */
.big-text {
position:absolute;
font-size:140px;
opacity:0.06;
font-weight:bold;
}

/* STORY */
.story {
background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover no-repeat;
}

.text-box {
max-width:600px;
padding:40px;
z-index:2;
}

/* GALLERY */
.gallery {
display:flex;
gap:20px;
overflow-x:auto;
padding:60px;
}

.gallery img {
height:420px;
border-radius:12px;
cursor:pointer;
transition:0.4s;
}

.gallery img:hover {
transform:scale(1.08);
}

/* LIGHTBOX */
.lightbox {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.lightbox img {
max-width:90%;
max-height:90%;
}

/* CTA */
.cta {
text-align:center;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="section hero">
<div class="overlay"></div>

<div class="hero-text">
<h1>SEIYAA</h1>
<p>VISUAL STORYTELLER</p>
</div>
</section>

<!-- STORY -->
<section class="section story">
<div class="big-text">VISION</div>

<div class="text-box">
<h2>I build atmosphere.</h2>
<p style="color:#bbb;">
Every frame is intentional. Every light has purpose.
This is not photography. This is storytelling.
</p>
</div>
</section>

<!-- GALLERY -->
<section>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1495567720989-cebdbdd97913" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" onclick="openLightbox(this)">
</div>
</section>

<!-- CTA -->
<section class="section cta">
<div>
<h2 style="font-size:40px;">LET’S WORK</h2>
<p style="color:#777;">DM me on Instagram</p>
</div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>

<script>
function openLightbox(img) {
document.getElementById("lightbox").style.display = "flex";
document.getElementById("lightbox-img").src = img.src;
}

function closeLightbox() {
document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
