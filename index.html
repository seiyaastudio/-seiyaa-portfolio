<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiyaa Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#0a0a0a;
  color:white;
  font-family:'Inter', sans-serif;
}

/* NAV */
nav {
  position:fixed;
  width:100%;
  padding:25px 80px;
  display:flex;
  justify-content:space-between;
  z-index:100;
  background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}

nav h1 {
  font-family:'Playfair Display', serif;
  letter-spacing:3px;
}

nav a {
  color:white;
  margin-left:30px;
  text-decoration:none;
  opacity:0.5;
}

nav a:hover { opacity:1; }

/* HERO */
.hero {
  height:100vh;
  background:url('images/_DSC8261.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  padding:0 100px;
  position:relative;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#0a0a0a 5%, transparent 60%);
}

.hero-content {
  position:relative;
  z-index:2;
}

.hero h2 {
  font-family:'Playfair Display', serif;
  font-size:72px;
}

/* SECTION */
.section {
  padding:140px 100px;
}

.section h2 {
  font-family:'Playfair Display', serif;
  margin-bottom:50px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:30px;
}

.grid img {
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:18px;
  cursor:pointer;
  transition:0.6s;
}

.grid img:hover {
  transform:scale(1.04);
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}

/* CTA */
.cta {
  text-align:center;
  padding:140px 20px;
}

.cta h2 {
  font-family:'Playfair Display', serif;
  font-size:36px;
}

.cta p {
  margin:20px 0;
  opacity:0.6;
}

.cta a {
  display:inline-block;
  padding:14px 28px;
  border:1px solid white;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.cta a:hover {
  background:white;
  color:black;
}

/* FOOTER */
.footer {
  text-align:center;
  padding:60px;
  opacity:0.4;
}

</style>
</head>

<body>

<nav>
  <h1>SEIYAA STUDIO</h1>
  <div>
    <a href="#market">Market</a>
    <a href="#street">Street</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h2>Cinematic Photography</h2>
  </div>
</section>

<!-- MARKET -->
<section class="section" id="market">
  <h2>Market Series</h2>
  <div class="grid">
    <img src="images/_DSC8255.jpg">
    <img src="images/_DSC8261.jpg">
    <img src="images/_DSC8267.jpg">
    <img src="images/_DSC7867.jpg">
  </div>
</section>

<!-- STREET -->
<section class="section" id="street">
  <h2>Street / Gas Station</h2>
  <div class="grid">
    <img src="images/_DSC8303.jpg">
    <img src="images/_DSC8330.jpg">
    <img src="images/_DSC7851.jpg">
    <img src="images/_DSC7860.jpg">
  </div>
</section>

<!-- CTA -->
<section class="cta">
  <h2>Work With Me</h2>
  <p>Available for creative shoots, brand work, and collaborations.</p>
  <a href="https://instagram.com/seiyaastudio" target="_blank">DM on Instagram</a>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<div class="footer">
  © Seiyaa Studio
</div>

<script>

const images = document.querySelectorAll(".grid img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

lightbox.addEventListener("click", () => {
  lightbox.style.display = "none";
});

</script>

</body>
</html>
