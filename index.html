<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiyaa Studio</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
}

/* NAV */
nav {
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 40px;
z-index:10;
}

nav a {
color:#aaa;
margin-left:20px;
text-decoration:none;
font-size:14px;
}

/* HERO */
.hero {
height:100vh;
background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover no-repeat;
position:relative;
display:flex;
align-items:center;
padding:80px;
}

.overlay {
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.hero-content {
position:relative;
z-index:2;
}

.hero h1 {
font-size:90px;
line-height:90px;
font-weight:bold;
}

.hero p {
margin-top:10px;
color:#aaa;
}

/* CARDS */
.cards {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:60px;
}

.card {
position:relative;
overflow:hidden;
border-radius:12px;
cursor:pointer;
}

.card img {
width:100%;
height:300px;
object-fit:cover;
transition:0.5s;
}

.card:hover img {
transform:scale(1.1);
}

.card-text {
position:absolute;
bottom:20px;
left:20px;
}

.card-text h3 {
font-size:18px;
}

/* CINEMATIC SECTION */
.cinematic {
height:100vh;
background:url('https://images.unsplash.com/photo-1469474968028-56623f02e42e') center/cover no-repeat;
display:flex;
align-items:center;
padding:80px;
}

.cinematic h2 {
font-size:60px;
max-width:400px;
}

/* LIGHTBOX */
.lightbox {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.lightbox img {
max-width:90%;
max-height:90%;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div>SEIYAA</div>
<div>
<a href="#">Home</a>
<a href="#">Work</a>
<a href="#">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="overlay"></div>

<div class="hero-content">
<h1>SEE<br>DIFFERENT</h1>
<p>Visual Storytelling</p>
</div>
</section>

<!-- CARDS -->
<section class="cards">
<div class="card" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1495567720989-cebdbdd97913">
<div class="card-text"><h3>PROJECT 01</h3></div>
</div>

<div class="card" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
<div class="card-text"><h3>PROJECT 02</h3></div>
</div>

<div class="card" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<div class="card-text"><h3>PROJECT 03</h3></div>
</div>

<div class="card" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<div class="card-text"><h3>PROJECT 04</h3></div>
</div>
</section>

<!-- CINEMATIC -->
<section class="cinematic">
<h2>CREATE<br>VISUAL<br>IMPACT</h2>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>

<script>
function openLightbox(card) {
const img = card.querySelector("img");
document.getElementById("lightbox").style.display = "flex";
document.getElementById("lightbox-img").src = img.src;
}

function closeLightbox() {
document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
