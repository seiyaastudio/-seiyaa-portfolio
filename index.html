<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eightysix Media — Seiyaa Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Inter',sans-serif;
background:#050505;
color:#fff;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* PROGRESS */
.progress{
position:fixed;
top:0;left:0;height:3px;width:0%;
background:linear-gradient(90deg,#00e0ff,#fff);
z-index:9999;
}

/* NAV */
.nav{
position:fixed;
top:0;width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
z-index:1000;
background:rgba(0,0,0,.6);
backdrop-filter:blur(12px);
}
.nav a{color:#aaa;text-decoration:none;margin-left:25px}
.nav a.active,.nav a:hover{color:#fff}

/* HERO */
.hero{
height:100vh;
position:relative;
display:flex;
align-items:center;
padding:0 8%;
}
.hero::before{
content:"";
position:absolute;inset:0;
background:url('images/_DSC8255.jpg') center/cover;
opacity:.25;
}
.hero-content{position:relative;max-width:600px}
.hero h1{
font-family:'Playfair Display';
font-size:64px;
}
.hero p{color:#aaa;margin:20px 0}
.btn{
padding:14px 28px;
border:1px solid #fff;
text-decoration:none;
color:#fff;
}
.btn:hover{background:#fff;color:#000}

/* SECTION */
.section{padding:120px 8%}

/* EDITORIAL GRID (LIKE REFERENCE) */
.editorial{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-bottom:20px;
}
.editorial img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
transition:.5s;
}
.editorial img:hover{transform:scale(1.05)}

.editorial-2{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
margin-top:20px;
}

/* BIG TEXT OVERLAY */
.block{
position:relative;
overflow:hidden;
}
.block .text{
position:absolute;
bottom:20px;
left:20px;
font-size:42px;
font-family:'Playfair Display';
}

/* LIGHTBOX */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}
.lightbox img{
max-width:95%;
max-height:95%;
object-fit:contain;
}

/* FILTER */
.filters{display:flex;gap:10px;margin-bottom:30px}
.filter{
padding:8px 18px;
border:1px solid #333;
cursor:pointer;
}
.filter.active{background:#fff;color:#000}

/* CTA */
.cta{
padding:120px 8%;
text-align:center;
background:#000;
}
.cta h2{font-size:40px;margin-bottom:20px}

/* CONTACT */
.form{
max-width:400px;
display:flex;
flex-direction:column;
gap:10px;
}
.form input,.form textarea{
background:#000;
border:1px solid #333;
padding:12px;
color:#fff;
}
.form button{
background:#00e0ff;
border:none;
padding:12px;
cursor:pointer;
}
.success{display:none;color:#0f0}

/* CHAT */
.chat-btn{
position:fixed;
bottom:20px;
right:20px;
background:#00e0ff;
padding:14px;
border-radius:50%;
cursor:pointer;
}
.chat-box{
position:fixed;
bottom:80px;
right:20px;
width:320px;
height:420px;
background:#111;
display:none;
flex-direction:column;
border:1px solid #333;
}
.chat-msg{flex:1;overflow-y:auto;padding:10px}
.chat-input{display:flex}
.chat-input input{flex:1;padding:10px;background:none;border:none;color:#fff}
.chat-input button{background:#00e0ff;border:none;padding:10px}
.quick{display:flex;gap:5px;padding:5px;flex-wrap:wrap}
.quick span{background:#222;padding:6px;border-radius:20px;cursor:pointer;font-size:12px}

/* MOBILE */
@media(max-width:768px){
.editorial{grid-template-columns:1fr}
.editorial-2{grid-template-columns:1fr}
.hero h1{font-size:42px}
}
</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="nav">
<div>Eightysix Media</div>
<div>
<a href="#portfolio">Work</a>
<a href="#contact">Contact</a>
</div>
</div>

<section class="hero">
<div class="hero-content">
<h1>We Build Visual Identity</h1>
<p>Seiyaa — Cinematic Photographer</p>
<a href="#portfolio" class="btn">View Work</a>
</div>
</section>

<section class="section" id="portfolio">

<div class="filters">
<div class="filter active" data="all">All</div>
<div class="filter" data="portrait">Portrait</div>
<div class="filter" data="fashion">Fashion</div>
<div class="filter" data="street">Street</div>
<div class="filter" data="creative">Creative</div>
</div>

<!-- EDITORIAL STYLE -->
<div class="editorial">

<div class="block item portrait">
<img src="images/_DSC8255.jpg">
<div class="text">Portrait</div>
</div>

<div class="block item fashion">
<img src="images/_DSC8267.jpg">
<div class="text">Concept</div>
</div>

</div>

<div class="block item street">
<img src="images/_DSC7851.jpg">
<div class="text">Street Mood</div>
</div>

<div class="editorial-2">

<div class="block item creative"><img src="images/_DSC7886.jpg"></div>
<div class="block item fashion"><img src="images/_DSC8303.jpg"></div>
<div class="block item portrait"><img src="images/_DSC8261.jpg"></div>

</div>

</section>

<section class="cta">
<h2>Book a Shoot</h2>
<a href="#contact" class="btn">Contact</a>
</section>

<section class="section" id="contact">
<h2>Contact</h2>

<form class="form" onsubmit="sendMail(event)">
<input id="name" placeholder="Name" required>
<input id="email" type="email" placeholder="Email" required>
<textarea id="msg" placeholder="Project" required></textarea>
<button>Send</button>
<div class="success" id="success">Opening email...</div>
</form>

</section>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat-box" id="chatBox">
<div class="chat-msg" id="chat"></div>

<div class="quick">
<span onclick="quick('price')">Pricing</span>
<span onclick="quick('booking')">Booking</span>
<span onclick="quick('services')">Services</span>
</div>

<div class="chat-input">
<input id="input">
<button onclick="send()">Send</button>
</div>
</div>

<script>

/* PROGRESS */
window.addEventListener("scroll",()=>{
let h=document.documentElement;
let sc=(h.scrollTop)/(h.scrollHeight-h.clientHeight)*100;
document.getElementById("progress").style.width=sc+"%";
});

/* FILTER */
document.querySelectorAll(".filter").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".filter").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
let val=btn.getAttribute("data");

document.querySelectorAll(".item").forEach(el=>{
el.style.display=(val==="all"||el.classList.contains(val))?"block":"none";
});
};
});

/* LIGHTBOX */
document.querySelectorAll(".item img").forEach(img=>{
img.onclick=()=>{
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=img.src;
};
});
document.getElementById("lightbox").onclick=()=>lightbox.style.display="none";

/* EMAIL */
function sendMail(e){
e.preventDefault();
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let msg=document.getElementById("msg").value;

window.location.href=`mailto:rainiercasas28@gmail.com?subject=Booking ${name}&body=${msg} (${email})`;

document.getElementById("success").style.display="block";
}

/* CHAT */
function toggleChat(){
let c=document.getElementById("chatBox");
c.style.display=c.style.display==="flex"?"none":"flex";
if(!c.dataset.init){
bot("Hi 👋 Ask about pricing, booking or services.");
c.dataset.init=true;
}
}

function quick(q){
document.getElementById("input").value=q;
send();
}

function send(){
let input=document.getElementById("input");
let msg=input.value.toLowerCase();
if(!msg)return;
user(msg);
setTimeout(()=>reply(msg),500);
input.value="";
}

function user(t){
chat.innerHTML+=`<div>> ${t}</div>`;
chat.scrollTop=chat.scrollHeight;
}

function bot(t){
chat.innerHTML+=`<div style="color:#aaa;">AI: ${t}</div>`;
chat.scrollTop=chat.scrollHeight;
}

function reply(m){
let r="I can help you.";
if(m.includes("price")) r="Packages ₱3k–₱15k.";
if(m.includes("booking")) r="Use contact form to book.";
if(m.includes("services")) r="Portrait, street, fashion shoots.";
bot(r);
}

</script>

</body>
</html>
