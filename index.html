<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seiyaa Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#050505;
  color:#fff;
  font-family:'Inter', sans-serif;
  overflow-x:hidden;
}

/* NAV */
.nav{
  position:fixed;
  width:100%;
  padding:25px 8%;
  display:flex;
  justify-content:space-between;
  z-index:1000;
  background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}

.logo{
  font-family:'Playfair Display';
  letter-spacing:3px;
}

.nav a{
  color:#aaa;
  margin-left:30px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-size:60px;
  font-family:'Playfair Display';
}

/* SECTION */
.section{
  padding:120px 8%;
}

h2{
  font-size:28px;
  margin-bottom:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* IMAGE BASE */
.grid img{
  width:100%;
  display:block;
  cursor:pointer;

  transform:scale(1);
  transition:
    transform 0.8s cubic-bezier(0.22,1,0.36,1),
    box-shadow 0.8s,
    filter 0.8s;

  will-change:transform;
}

/* PREMIUM HOVER */
.grid img:hover{
  transform:scale(1.08) translateY(-6px);
  box-shadow:0 30px 80px rgba(0,0,0,0.8);
  filter:brightness(1.08) contrast(1.05);
}

/* BLUR LOADING */
.img-blur{
  filter:blur(25px);
  transform:scale(1.05);
  opacity:0;
}

.img-blur.loaded{
  filter:blur(0);
  transform:scale(1);
  opacity:1;
  transition:all 1s ease;
}

/* SCROLL REVEAL */
.fade{
  opacity:0;
  transform:translateY(60px);
}

.fade.show{
  opacity:1;
  transform:translateY(0);
  transition:1s ease;
}

/* PARALLAX */
.parallax{
  transform:translateY(0);
  transition:transform 0.2s linear;
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

#lightbox img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">SEIYAA</div>
  <div>
    <a href="#portfolio">Portfolio</a>
  </div>
</div>

<div class="hero">
  <h1 class="fade">Creative Direction & Photography</h1>
</div>

<section class="section fade" id="portfolio">

<h2>Urban Market Series</h2>
<div class="grid">
<img class="img-blur parallax" src="images/_DSC8255.jpg">
<img class="img-blur parallax" src="images/_DSC8261.jpg">
<img class="img-blur parallax" src="images/_DSC8267.jpg">
<img class="img-blur parallax" src="images/_DSC8303.jpg">
<img class="img-blur parallax" src="images/_DSC8330.jpg">
</div>

<h2 style="margin-top:120px;">Gas Station Editorial</h2>
<div class="grid">
<img class="img-blur parallax" src="images/_DSC7851.jpg">
<img class="img-blur parallax" src="images/_DSC7860.jpg">
<img class="img-blur parallax" src="images/_DSC7867.jpg">
<img class="img-blur parallax" src="images/_DSC7886.jpg">
<img class="img-blur parallax" src="images/_DSC7900.jpg">
</div>

<h2 style="margin-top:120px;">Night Street Cinematics</h2>
<div class="grid">
<img class="img-blur parallax" src="images/_DSC7665.jpg">
<img class="img-blur parallax" src="images/_DSC7676.jpg">
<img class="img-blur parallax" src="images/_DSC7679.jpg">
<img class="img-blur parallax" src="images/_DSC7685.jpg">
<img class="img-blur parallax" src="images/_DSC7694.jpg">
</div>

<h2 style="margin-top:120px;">Rebel / Underground Series</h2>
<div class="grid">
<img class="img-blur parallax" src="images/_DSC8091.jpg">
<img class="img-blur parallax" src="images/_DSC8092.jpg">
<img class="img-blur parallax" src="images/_DSC8093.jpg">
<img class="img-blur parallax" src="images/_DSC8105.jpg">
<img class="img-blur parallax" src="images/_DSC8112.jpg">
</div>

</section>

<div id="lightbox">
  <img id="lightbox-img">
</div>

<script>

/* BLUR LOAD */
document.querySelectorAll('.img-blur').forEach(img=>{
  if(img.complete){
    img.classList.add('loaded');
  }else{
    img.addEventListener('load',()=>img.classList.add('loaded'));
  }
});

/* SCROLL REVEAL */
const observer=new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
},{threshold:0.15});

document.querySelectorAll('.fade').forEach(el=>{
  observer.observe(el);
});

/* PARALLAX */
window.addEventListener("scroll",()=>{
  const scrolled=window.scrollY;
  document.querySelectorAll('.parallax').forEach(el=>{
    const speed=0.08;
    el.style.transform=`translateY(${scrolled * speed}px)`;
  });
});

/* LIGHTBOX */
const images=document.querySelectorAll(".grid img");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

images.forEach(img=>{
  img.onclick=()=>{
    lightbox.style.display="flex";
    lightboxImg.src=img.src;
  };
});

lightbox.onclick=()=>lightbox.style.display="none";

</script>

</body>
</html>
