<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eightysix Media — Seiyaa Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#020611;
--accent:#00e0ff;
--text:#ffffff;
--muted:#8aa3b8;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top,#041a2d,#020611);
color:#fff;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* SCROLL PROGRESS */
.progress{
position:fixed;
top:0;
left:0;
height:3px;
width:0%;
background:linear-gradient(90deg,#00e0ff,#ffffff);
z-index:9999;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
background:rgba(0,0,0,.5);
backdrop-filter:blur(14px);
}
.logo{
font-family:'Playfair Display';
letter-spacing:3px;
}
.nav-links a{
color:#aaa;
margin-left:25px;
text-decoration:none;
}
.nav-links a.active,
.nav-links a:hover{color:#fff}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
padding:0 8%;
position:relative;
}
.hero::before{
content:"";
position:absolute;
inset:0;
background:url('images/_DSC8255.jpg') center/cover;
opacity:.25;
}
.hero-content{position:relative;max-width:650px;}
.hero h1{
font-family:'Playfair Display';
font-size:64px;
}
.hero p{color:var(--muted);margin:20px 0}
.btn{
padding:14px 30px;
border:1px solid #fff;
text-decoration:none;
color:#fff;
margin-right:10px;
}
.btn:hover{background:#fff;color:#000}

/* SECTION */
.section{padding:120px 8%}
.section h2{
font-family:'Playfair Display';
font-size:36px;
margin-bottom:20px;
}
.section p{color:var(--muted);margin-bottom:40px}

/* FILTER */
.filters{display:flex;gap:10px;margin-bottom:30px;flex-wrap:wrap;}
.filter-btn{
padding:8px 18px;
border:1px solid var(--border);
cursor:pointer;
}
.filter-btn.active{background:#fff;color:#000}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}
.item{
aspect-ratio:4/5;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.4s;
}
.item.hide{opacity:0;transform:scale(.9);pointer-events:none}
.item img{
width:100%;
height:100%;
object-fit:cover;
transition:.5s;
}
.item:hover img{transform:scale(1.08)}

/* LIGHTBOX */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}
.lightbox.active{display:flex}
.lightbox img{
max-width:95%;
max-height:95%;
object-fit:contain;
}

/* CTA */
.cta{text-align:center;padding:100px 8%;background:#000}
.cta h2{font-size:40px;margin-bottom:20px}

/* FORM */
.form{max-width:400px;display:flex;flex-direction:column;gap:10px;}
.form input,.form textarea{
background:#000;
border:1px solid #333;
padding:12px;
color:#fff;
}
.form button{
padding:14px;
background:#00e0ff;
border:none;
cursor:pointer;
}
.success{display:none;color:#00ffae}

/* CHAT */
.chat-btn{
position:fixed;
bottom:20px;
right:20px;
background:#00e0ff;
padding:14px;
border-radius:50%;
cursor:pointer;
}
.chat-box{
position:fixed;
bottom:80px;
right:20px;
width:320px;
height:420px;
background:#111;
display:none;
flex-direction:column;
border:1px solid #333;
}
.chat-messages{flex:1;overflow-y:auto;padding:10px}
.chat-input{display:flex}
.chat-input input{flex:1;background:none;border:none;color:#fff;padding:10px}
.chat-input button{background:#00e0ff;border:none;padding:10px}
.quick{display:flex;gap:5px;flex-wrap:wrap;padding:5px}
.quick span{background:#222;padding:6px;border-radius:20px;cursor:pointer;font-size:12px}

</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="nav">
<div class="logo">EIGHTYSIX MEDIA</div>
<div class="nav-links">
<a href="#portfolio">Work</a>
<a href="#contact">Contact</a>
</div>
</div>

<section class="hero">
<div class="hero-content">
<h1>Cinematic Visual Identity</h1>
<p>Seiyaa — Photographer | Eightysix Media — Studio</p>
<a href="#portfolio" class="btn">View Work</a>
</div>
</section>

<section class="section" id="portfolio">
<h2>Portfolio</h2>

<div class="filters">
<div class="filter-btn active" data-filter="all">All</div>
<div class="filter-btn" data-filter="portrait">Portrait</div>
<div class="filter-btn" data-filter="fashion">Fashion</div>
<div class="filter-btn" data-filter="street">Street</div>
<div class="filter-btn" data-filter="creative">Creative</div>
</div>

<div class="grid">
<div class="item" data-cat="portrait"><img src="images/_DSC8255.jpg" loading="lazy"></div>
<div class="item" data-cat="portrait"><img src="images/_DSC8261.jpg" loading="lazy"></div>
<div class="item" data-cat="fashion"><img src="images/_DSC8267.jpg" loading="lazy"></div>
<div class="item" data-cat="fashion"><img src="images/_DSC8303.jpg" loading="lazy"></div>
<div class="item" data-cat="street"><img src="images/_DSC7851.jpg" loading="lazy"></div>
<div class="item" data-cat="street"><img src="images/_DSC7860.jpg" loading="lazy"></div>
<div class="item" data-cat="creative"><img src="images/_DSC7886.jpg" loading="lazy"></div>
<div class="item" data-cat="creative"><img src="images/_DSC7900.jpg" loading="lazy"></div>
</div>
</section>

<section class="cta">
<h2>Book Your Shoot</h2>
<a href="#contact" class="btn">Contact</a>
</section>

<section class="section" id="contact">
<h2>Contact</h2>
<form class="form" onsubmit="sendMail(event)">
<input id="name" required placeholder="Name">
<input id="email" type="email" required placeholder="Email">
<textarea id="msg" required placeholder="Project"></textarea>
<button>Send</button>
<div class="success" id="success">Opening email...</div>
</form>
</section>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat-box" id="chatBox">
<div class="chat-messages" id="chatMessages"></div>

<div class="quick">
<span onclick="quick('pricing')">Pricing</span>
<span onclick="quick('services')">Services</span>
<span onclick="quick('booking')">Booking</span>
</div>

<div class="chat-input">
<input id="chatInput">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<script>

/* PROGRESS */
window.addEventListener("scroll",()=>{
let h=document.documentElement;
let sc=(h.scrollTop)/(h.scrollHeight-h.clientHeight)*100;
document.getElementById("progress").style.width=sc+"%";
});

/* FILTER */
document.querySelectorAll(".filter-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

let f=btn.dataset.filter;

document.querySelectorAll(".item").forEach(i=>{
i.classList.toggle("hide",f!=="all" && i.dataset.cat!==f);
});
};
});

/* LIGHTBOX */
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

document.querySelectorAll(".item img").forEach(img=>{
img.onclick=()=>{
lightbox.classList.add("active");
lightboxImg.src=img.src;
};
});

lightbox.onclick=()=>lightbox.classList.remove("active");

/* EMAIL */
function sendMail(e){
e.preventDefault();
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let msg=document.getElementById("msg").value;

window.location.href=`mailto:rainiercasas28@gmail.com?subject=Booking from ${name}&body=${msg} (${email})`;

document.getElementById("success").style.display="block";
}

/* CHAT */
function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
if(!box.dataset.init){
addBot("Hi 👋 Ask about pricing, booking or services.");
box.dataset.init=true;
}
}

function quick(q){
document.getElementById("chatInput").value=q;
sendMsg();
}

function sendMsg(){
let input=document.getElementById("chatInput");
let msg=input.value.toLowerCase();
if(!msg)return;

addUser(msg);
setTimeout(()=>reply(msg),600);
input.value="";
}

function addUser(t){
let c=document.getElementById("chatMessages");
c.innerHTML+=`<div>> ${t}</div>`;
c.scrollTop=c.scrollHeight;
}

function addBot(t){
let c=document.getElementById("chatMessages");
c.innerHTML+=`<div style="color:#aaa;">AI: ${t}</div>`;
c.scrollTop=c.scrollHeight;
}

function reply(msg){
let r="I can help you.";
if(msg.includes("price")) r="Pricing starts ₱3k–₱15k.";
else if(msg.includes("service")) r="Photography, branding & creative direction.";
else if(msg.includes("book")) r="Go to contact section to book.";
addBot(r);
}

</script>

</body>
</html>
