<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiyaa Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#050505;
  color:#fff;
  font-family:'Inter', sans-serif;
  overflow-x:hidden;
}

/* NAV */
nav {
  position:fixed;
  width:100%;
  padding:25px 80px;
  display:flex;
  justify-content:space-between;
  z-index:100;
  backdrop-filter:blur(10px);
}

nav h1 {
  font-family:'Playfair Display', serif;
  letter-spacing:3px;
  font-size:18px;
}

nav a {
  margin-left:30px;
  text-decoration:none;
  color:white;
  opacity:.6;
  transition:.3s;
}

nav a:hover { opacity:1; }

/* HERO */
.hero {
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  padding:0 100px;
  overflow:hidden;
}

.hero-slide {
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity 2s ease;
  transform:scale(1.05);
}

.hero-slide.active {
  opacity:1;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#050505 5%,transparent 60%);
}

.hero-content {
  position:relative;
  z-index:2;
  max-width:700px;
}

.hero h2 {
  font-family:'Playfair Display', serif;
  font-size:80px;
  line-height:1.1;
}

.hero p {
  margin-top:20px;
  opacity:.7;
}

/* BUTTONS */
.hero-buttons {
  margin-top:30px;
}

.hero-buttons a {
  display:inline-block;
  padding:14px 28px;
  margin-right:12px;
  border:1px solid rgba(255,255,255,.4);
  text-decoration:none;
  color:white;
  transition:.4s;
}

.hero-buttons a:hover {
  background:white;
  color:black;
}

/* SECTION */
.section {
  padding:160px 100px;
}

.section h2 {
  font-family:'Playfair Display', serif;
  font-size:36px;
  margin-bottom:60px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:40px;
}

.card {
  position:relative;
  overflow:hidden;
  border-radius:18px;
}

.card img {
  width:100%;
  height:420px;
  object-fit:cover;
  transition:1s;
}

/* PREMIUM HOVER */
.card:hover img {
  transform:scale(1.08);
}

.card::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.5), transparent);
  opacity:0;
  transition:.5s;
}

.card:hover::after {
  opacity:1;
}

/* FADE ANIMATION */
.fade {
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.fade.show {
  opacity:1;
  transform:translateY(0);
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:200;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}

/* CTA */
.cta {
  text-align:center;
  padding:160px 20px;
}

.cta a {
  padding:16px 32px;
  border:1px solid white;
  text-decoration:none;
  color:white;
}

.cta a:hover {
  background:white;
  color:black;
}

</style>
</head>

<body>

<nav>
  <h1>SEIYAA STUDIO</h1>
  <div>
    <a href="#market">Market</a>
    <a href="#street">Street</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">

  <!-- MAKE THIS FIRST IMAGE YOUR APPLE HERO -->
  <div class="hero-slide active" style="background-image:url('images/_DSC8261.jpg')"></div>
  <div class="hero-slide" style="background-image:url('images/_DSC8255.jpg')"></div>
  <div class="hero-slide" style="background-image:url('images/_DSC8303.jpg')"></div>

  <div class="hero-content">
    <h2>Cinematic Photography</h2>
    <p>Visual storytelling with a luxury editorial feel.</p>

    <div class="hero-buttons">
      <a href="#market">View Work</a>
      <a href="#">Book Now</a>
    </div>
  </div>

</section>

<!-- MARKET -->
<section class="section fade" id="market">
  <h2>Market Series</h2>
  <div class="grid">

    <!-- PURE MARKET ONLY -->
    <div class="card"><img src="images/_DSC8255.jpg"></div>
    <div class="card"><img src="images/_DSC8261.jpg"></div>
    <div class="card"><img src="images/_DSC8267.jpg"></div>
    <div class="card"><img src="images/_DSC7867.jpg"></div>

  </div>
</section>

<!-- STREET -->
<section class="section fade" id="street">
  <h2>Street / Gas Station</h2>
  <div class="grid">

    <!-- PURE STREET ONLY -->
    <div class="card"><img src="images/_DSC8303.jpg"></div>
    <div class="card"><img src="images/_DSC8330.jpg"></div>
    <div class="card"><img src="images/_DSC7851.jpg"></div>
    <div class="card"><img src="images/_DSC7860.jpg"></div>

  </div>
</section>

<!-- CTA -->
<section class="cta">
  <a href="#">Start a Project</a>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>

/* HERO AUTO */
const slides = document.querySelectorAll(".hero-slide");
let current = 0;

setInterval(() => {
  slides[current].classList.remove("active");
  current = (current + 1) % slides.length;
  slides[current].classList.add("active");
}, 5000);

/* SCROLL FADE */
const faders = document.querySelectorAll(".fade");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

faders.forEach(el => observer.observe(el));

/* LIGHTBOX */
const imgs = document.querySelectorAll(".card img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

imgs.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

lightbox.addEventListener("click", () => {
  lightbox.style.display = "none";
});

</script>

</body>
</html>
