<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiyaa Studio</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  z-index: 1000;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  font-size: 14px;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('images/_DSC8255.jpg') center/cover no-repeat;
  display: flex;
  align-items: flex-end;
  padding: 60px;
}

.hero h1 {
  font-size: 60px;
}

/* SECTION */
.section {
  padding: 80px 40px;
}

.section h2 {
  margin-bottom: 20px;
  font-size: 24px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 15px;
}

.grid img {
  width: 100%;
  cursor: pointer;
  transition: 0.3s;
}

.grid img:hover {
  transform: scale(1.03);
}

/* FULLSCREEN VIEW */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}

</style>
</head>

<body>

<nav>
  <div><b>SEIYAA STUDIO</b></div>
  <div>
    <a href="#">Home</a>
    <a href="#market">Market</a>
    <a href="#street">Street</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>VISUAL STORYTELLER</h1>
</section>

<!-- MARKET -->
<section class="section" id="market">
  <h2>MARKET SERIES</h2>
  <div class="grid">
    <img src="images/_DSC8261.jpg">
    <img src="images/_DSC8267.jpg">
    <img src="images/_DSC7867.jpg">
    <img src="images/_DSC7886.jpg">
  </div>
</section>

<!-- STREET -->
<section class="section" id="street">
  <h2>STREET / GAS STATION</h2>
  <div class="grid">
    <img src="images/_DSC8303.jpg">
    <img src="images/_DSC8330.jpg">
    <img src="images/_DSC7851.jpg">
    <img src="images/_DSC7860.jpg">
  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img src="" id="lightbox-img">
</div>

<script>
const images = document.querySelectorAll(".grid img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

lightbox.addEventListener("click", () => {
  lightbox.style.display = "none";
});
</script>

</body>
</html>
