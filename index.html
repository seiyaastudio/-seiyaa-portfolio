<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiyaa Studio</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html {
scroll-behavior: smooth;
}

body {
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
}

/* NAVBAR */
nav {
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 40px;
z-index:1000;
background:rgba(0,0,0,0.5);
backdrop-filter: blur(10px);
}

nav a {
margin-left:20px;
text-decoration:none;
color:#aaa;
font-size:14px;
}

nav a:hover {
color:#fff;
}

/* SECTIONS */
.section {
height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* HERO */
.hero {
background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover no-repeat;
}

.overlay {
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
}

.hero-text {
z-index:2;
text-align:center;
}

.hero-text h1 {
font-size:90px;
letter-spacing:10px;
}

.hero-text p {
color:#aaa;
letter-spacing:4px;
}

/* WORK SECTION */
.work {
padding:80px 40px;
}

/* GALLERY */
.gallery {
display:flex;
gap:20px;
overflow-x:auto;
}

.gallery img {
height:400px;
border-radius:12px;
cursor:pointer;
transition:0.4s;
}

.gallery img:hover {
transform:scale(1.08);
}

/* LIGHTBOX */
.lightbox {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.lightbox img {
max-width:90%;
max-height:90%;
}

/* GEAR */
.gear {
padding:100px 40px;
max-width:900px;
margin:auto;
}

/* CONTACT */
.contact {
text-align:center;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<div>SEIYAA</div>
<div>
<a href="#home">Home</a>
<a href="#work">Work</a>
<a href="#gear">Gear</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<section id="home" class="section hero">
<div class="overlay"></div>

<div class="hero-text">
<h1>SEIYAA</h1>
<p>VISUAL STORYTELLER</p>
</div>
</section>

<!-- WORK -->
<section id="work" class="work">
<h2 style="font-size:30px; margin-bottom:30px;">Selected Work</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1495567720989-cebdbdd97913" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" onclick="openLightbox(this)">
</div>
</section>

<!-- GEAR -->
<section id="gear" class="gear">
<h2 style="font-size:30px;">Gear</h2>

<p style="color:#aaa; margin-top:20px;">
Sony A6400<br>
Sigma 16mm f1.4<br>
7Artisans 35mm f1.8<br>
Godox TT600
</p>
</section>

<!-- CONTACT -->
<section id="contact" class="section contact">
<div>
<h2 style="font-size:40px;">Let’s Work</h2>
<p style="color:#777;">DM me on Instagram</p>
</div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>

<script>
function openLightbox(img) {
document.getElementById("lightbox").style.display = "flex";
document.getElementById("lightbox-img").src = img.src;
}

function closeLightbox() {
document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
