<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eightysix Media — Seiyaa Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050505;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.12);
--text:#fff;
--muted:#9a9a9a;
--accent:#fff;
--glow:0 0 60px rgba(255,255,255,0.12);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
color:var(--text);
font-family:'Inter',sans-serif;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* CURSOR GLOW */
.cursor-glow{
position:fixed;
width:420px;
height:420px;
pointer-events:none;
background:radial-gradient(circle,rgba(255,255,255,0.06),transparent 70%);
transform:translate(-50%,-50%);
z-index:0;
filter:blur(50px);
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
background:rgba(0,0,0,.6);
backdrop-filter:blur(14px);
}
.logo{font-family:'Playfair Display';letter-spacing:3px}
.nav a{color:var(--muted);margin-left:25px;text-decoration:none;transition:.3s}
.nav a.active,.nav a:hover{color:#fff}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
padding:0 8%;
position:relative;
}
.hero::before{
content:"";
position:absolute;
inset:0;
background:url('images/_DSC8255.jpg') center/cover;
opacity:.4;
}
.hero-content{position:relative;z-index:2;}
.hero h1{
font-family:'Playfair Display';
font-size:72px;
line-height:1.05;
}
.hero-words{
margin-top:20px;
letter-spacing:3px;
font-size:12px;
color:var(--muted);
height:20px;
}

/* QUOTES */
.quote-section{
padding:160px 8%;
text-align:center;
}
.quote-text{
font-family:'Playfair Display';
font-size:42px;
max-width:900px;
margin:auto;
opacity:0;
transform:translateY(30px);
transition:.7s;
}
.quote-text.active{
opacity:1;
transform:translateY(0);
}

/* SECTION */
.section{padding:120px 8%}
.section h2{
font-family:'Playfair Display';
font-size:44px;
margin-bottom:30px;
}

/* FILTER */
.filters{display:flex;gap:10px;margin-bottom:40px;flex-wrap:wrap}
.filter-btn{
padding:10px 18px;
border:1px solid var(--border);
cursor:pointer;
transition:.3s;
}
.filter-btn.active{background:#fff;color:#000}

/* GRID (CINEMATIC HIERARCHY) */
.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
grid-auto-rows:140px;
gap:16px;
}
.item{
position:relative;
overflow:hidden;
border-radius:14px;
cursor:pointer;
transition:.4s;
}
.item img{
width:100%;
height:100%;
object-fit:cover;
transition:.6s;
}
.item:hover img{transform:scale(1.12)}

.item.large{grid-column:span 3;grid-row:span 3}
.item.wide{grid-column:span 3;grid-row:span 2}
.item.tall{grid-column:span 2;grid-row:span 3}
.item.small{grid-column:span 2;grid-row:span 2}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:12px;
background:linear-gradient(transparent,rgba(0,0,0,.9));
opacity:0;
transition:.3s;
font-size:12px;
}
.item:hover .overlay{opacity:1}

.item.hide{
opacity:0;
transform:scale(.8);
pointer-events:none;
}

/* LIGHTBOX */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.96);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}
.lightbox.active{display:flex}
.lightbox img{max-width:95%;max-height:95%}

/* CONTACT */
.form{
max-width:420px;
display:flex;
flex-direction:column;
gap:12px;
}
.form input,.form textarea{
background:#000;
border:1px solid #333;
padding:12px;
color:#fff;
}
.form button{
padding:14px;
background:#fff;
border:none;
cursor:pointer;
}
.success{
display:none;
color:#0f0;
margin-top:10px;
}

/* CHAT */
.chat-btn{
position:fixed;
bottom:20px;
right:20px;
background:#fff;
color:#000;
padding:14px 18px;
border-radius:30px;
cursor:pointer;
z-index:999;
}

.chat-box{
position:fixed;
bottom:80px;
right:20px;
width:360px;
height:520px;
background:#0b0b0b;
border:1px solid #333;
display:none;
flex-direction:column;
z-index:999;
border-radius:14px;
overflow:hidden;
}

.chat-messages{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg-user{
align-self:flex-end;
background:#fff;
color:#000;
padding:8px 12px;
border-radius:12px;
}

.msg-bot{
align-self:flex-start;
background:#1a1a1a;
padding:8px 12px;
border-radius:12px;
}

/* MOBILE */
@media(max-width:768px){
.grid{grid-template-columns:repeat(2,1fr)}
.item.large,.item.wide,.item.tall,.item.small{
grid-column:span 2;
grid-row:span 2;
}
.hero h1{font-size:42px}
.quote-text{font-size:28px}
}
</style>
</head>

<body>

<div class="cursor-glow" id="glow"></div>

<div class="nav">
<div class="logo">EIGHTYSIX MEDIA</div>
<div>
<a href="#portfolio">Work</a>
<a href="#quotes">Vision</a>
<a href="#contact">Contact</a>
</div>
</div>

<section class="hero">
<div class="hero-content">
<h1>Cinematic Visual Identity</h1>
<div class="hero-words" id="heroWords"></div>
</div>
</section>

<section class="quote-section" id="quotes">
<div class="quote-text" id="quoteText"></div>
</section>

<section class="section" id="portfolio">
<h2>Portfolio</h2>

<div class="filters">
<div class="filter-btn active" data-filter="all">All</div>
<div class="filter-btn" data-filter="portrait">Portrait</div>
<div class="filter-btn" data-filter="fashion">Fashion</div>
<div class="filter-btn" data-filter="street">Street</div>
<div class="filter-btn" data-filter="creative">Creative</div>
</div>

<div class="grid" id="grid"></div>
</section>

<section class="section" id="contact">
<h2>Contact</h2>
<form class="form" onsubmit="sendEmail(event)">
<input id="name" required placeholder="Name">
<input id="email" type="email" required placeholder="Email">
<textarea id="msg" required placeholder="Project details"></textarea>
<button type="submit">Send Inquiry</button>
<div class="success" id="success">Opening email...</div>
</form>
</section>

<div class="lightbox" id="lightbox"><img id="lightbox-img"></div>

<div class="chat-btn" onclick="toggleChat()">Chat</div>
<div class="chat-box" id="chatBox">
<div class="chat-messages" id="chatMessages"></div>
</div>

<script>

/* CURSOR */
document.addEventListener("mousemove",e=>{
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

/* HERO WORDS */
const words=["CINEMATIC","RAW","EDITORIAL","STORY","IDENTITY","MOOD"];
let wi=0;
setInterval(()=>{
heroWords.textContent=words[wi];
wi=(wi+1)%words.length;
},1500);

/* QUOTES */
const quotes=[
"You're not hiring a photographer. You're building authority.",
"Your visuals should feel like a movie, not a post.",
"We don’t shoot photos. We create perception.",
"Attention is earned in milliseconds. We make it count.",
"Strong visuals don’t just look good. They convert.",
"You don’t need more content. You need better visuals."
];

let qi=0;
function rotateQuote(){
quoteText.classList.remove("active");
setTimeout(()=>{
quoteText.textContent=quotes[qi];
quoteText.classList.add("active");
qi=(qi+1)%quotes.length;
},300);
}
rotateQuote();
setInterval(rotateQuote,6000);

/* IMAGES */
const images=[
["_DSC8255","portrait","large"],["_DSC8330","portrait","large"],["_DSC8267","portrait","tall"],["_DSC8261","portrait","small"],["_DSC8303","portrait","wide"],
["_DSC7851","fashion","large"],["_DSC7867","fashion","tall"],["_DSC7860","fashion","small"],["_DSC7886","fashion","wide"],["_DSC7900","fashion","small"],
["_DSC7665","street","large"],["_DSC7685","street","tall"],["_DSC7676","street","small"],["_DSC7679","street","wide"],["_DSC7694","street","small"],
["_DSC8091","creative","large"],["_DSC8105","creative","tall"],["_DSC8092","creative","small"],["_DSC8093","creative","wide"],["_DSC8112","creative","small"]
];

grid.innerHTML=images.map(i=>`
<div class="item ${i[2]}" data-cat="${i[1]}">
<img src="images/${i[0]}.jpg" loading="lazy">
<div class="overlay">${i[1]}</div>
</div>
`).join("");

/* FILTER */
document.querySelectorAll(".filter-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
let f=btn.dataset.filter;
document.querySelectorAll(".item").forEach(i=>{
i.classList.toggle("hide",f!=="all" && i.dataset.cat!==f);
});
};
});

/* LIGHTBOX */
document.addEventListener("click",e=>{
if(e.target.tagName==="IMG" && e.target.closest(".item")){
lightboxImg.src=e.target.src;
lightbox.classList.add("active");
}
});
lightbox.onclick=()=>lightbox.classList.remove("active");

/* CONTACT */
function sendEmail(e){
e.preventDefault();
if(!name.value||!email.value||!msg.value)return;
window.location.href=`mailto:rainiercasas28@gmail.com?subject=${name.value}&body=${msg.value} (${email.value})`;
success.style.display="block";
}

/* CHATBOT */
function toggleChat(){
chatBox.style.display=chatBox.style.display==="flex"?"none":"flex";
if(!chatBox.dataset.init){
bot("Ask about pricing, booking, services, or creative direction.");
chatBox.dataset.init=true;
}
}

function bot(t){
chatMessages.innerHTML+=`<div class="msg-bot">${t}</div>`;
chatMessages.scrollTop=chatMessages.scrollHeight;
}

</script>

</body>
</html>
