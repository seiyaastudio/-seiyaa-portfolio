<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiyaa Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0a0a;
  color: white;
  font-family: 'Inter', sans-serif;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 25px 60px;
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav h1 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  letter-spacing: 2px;
}

nav a {
  color: #aaa;
  margin-left: 30px;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

nav a:hover {
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  padding: 0 60px;
}

.hero h2 {
  font-size: 60px;
  font-family: 'Playfair Display', serif;
}

/* SECTION */
.section {
  padding: 100px 60px;
}

.section h2 {
  font-size: 32px;
  margin-bottom: 40px;
  font-family: 'Playfair Display', serif;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.grid img {
  width: 100%;
  height: 320px;
  object-fit: cover;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.4s ease;
}

.grid img:hover {
  transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h1>SEIYAA STUDIO</h1>
  <div>
    <a href="#market">Market</a>
    <a href="#street">Street</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h2>Cinematic Photography</h2>
</section>

<!-- MARKET -->
<section class="section fade" id="market">
  <h2>Market Series</h2>
  <div class="grid">
    <img src="images/_DSC8261.jpg">
    <img src="images/_DSC8267.jpg">
    <img src="images/_DSC7867.jpg">
    <img src="images/_DSC7886.jpg">
  </div>
</section>

<!-- STREET -->
<section class="section fade" id="street">
  <h2>Street / Gas Station</h2>
  <div class="grid">
    <img src="images/_DSC8303.jpg">
    <img src="images/_DSC8330.jpg">
    <img src="images/_DSC7851.jpg">
    <img src="images/_DSC7860.jpg">
  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>
// FADE ANIMATION
const faders = document.querySelectorAll(".fade");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

faders.forEach(el => observer.observe(el));

// LIGHTBOX
const images = document.querySelectorAll(".grid img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

lightbox.addEventListener("click", () => {
  lightbox.style.display = "none";
});
</script>

</body>
</html>
