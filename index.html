<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eightysix Media — Seiyaa Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050505;
--text:#fff;
--muted:#999;
--border:#222;
}

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif}

/* NAV */
.nav{
position:fixed;width:100%;padding:18px 8%;
display:flex;justify-content:space-between;
background:rgba(0,0,0,.6);backdrop-filter:blur(10px);z-index:1000;
}
.nav a{color:var(--muted);margin-left:20px;text-decoration:none}
.nav a.active{color:#fff}

/* HERO */
.hero{
height:100vh;
display:flex;align-items:center;padding:0 8%;
background:url('images/_DSC8255.jpg') center/cover no-repeat;
}
.hero h1{font-size:64px;font-family:'Playfair Display'}

/* SECTION */
.section{padding:100px 8%}

/* FILTER */
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:8px 16px;border:1px solid var(--border);cursor:pointer}
.filter-btn.active{background:#fff;color:#000}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.item{
position:relative;
overflow:hidden;
border-radius:12px;
transition:.4s;
}
.item img{
width:100%;height:100%;object-fit:cover;
transition:.5s;
}
.item:hover img{transform:scale(1.08)}

/* OVERLAY */
.overlay{
position:absolute;inset:0;
background:linear-gradient(transparent,rgba(0,0,0,.8));
opacity:0;
display:flex;
align-items:end;
padding:15px;
transition:.4s;
}
.item:hover .overlay{opacity:1}

/* HIDE */
.item.hide{opacity:0;transform:scale(.9);pointer-events:none}

/* LIGHTBOX */
.lightbox{
position:fixed;inset:0;
background:#000;display:none;
justify-content:center;align-items:center;
z-index:2000;
}
.lightbox img{max-width:95%;max-height:95%}

/* CTA */
.cta{text-align:center;padding:100px}
.cta h2{font-size:40px}

/* CONTACT */
.form{max-width:400px;display:flex;flex-direction:column;gap:10px}
.form input,.form textarea{
background:#000;border:1px solid var(--border);padding:12px;color:#fff
}
.form button{background:#fff;border:none;padding:12px;cursor:pointer}
.success{display:none;color:#0f0}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:38px}
}
</style>
</head>

<body>

<div class="nav">
<div>Eightysix Media</div>
<div>
<a href="#portfolio">Work</a>
<a href="#contact">Contact</a>
</div>
</div>

<section class="hero">
<h1>Cinematic Identity</h1>
</section>

<section class="section" id="portfolio">
<h2>Portfolio</h2>

<div class="filters">
<div class="filter-btn active" data="all">All</div>
<div class="filter-btn" data="portrait">Portrait</div>
<div class="filter-btn" data="fashion">Fashion</div>
<div class="filter-btn" data="street">Street</div>
<div class="filter-btn" data="creative">Creative</div>
</div>

<div class="grid">

<!-- PORTRAIT -->
<div class="item portrait"><img loading="lazy" src="images/_DSC8255.jpg"><div class="overlay">Portrait</div></div>
<div class="item portrait"><img loading="lazy" src="images/_DSC7851.jpg"><div class="overlay">Portrait</div></div>

<!-- FASHION -->
<div class="item fashion"><img loading="lazy" src="images/_DSC8261.jpg"><div class="overlay">Fashion</div></div>
<div class="item fashion"><img loading="lazy" src="images/_DSC7860.jpg"><div class="overlay">Fashion</div></div>

<!-- STREET -->
<div class="item street"><img loading="lazy" src="images/_DSC8267.jpg"><div class="overlay">Street</div></div>
<div class="item street"><img loading="lazy" src="images/_DSC7886.jpg"><div class="overlay">Street</div></div>

<!-- CREATIVE -->
<div class="item creative"><img loading="lazy" src="images/_DSC8303.jpg"><div class="overlay">Creative</div></div>
<div class="item creative"><img loading="lazy" src="images/_DSC7900.jpg"><div class="overlay">Creative</div></div>

</div>
</section>

<section class="cta">
<h2>Let’s Build Your Visual Identity</h2>
</section>

<section class="section" id="contact">
<form class="form" onsubmit="sendEmail(event)">
<input id="name" required placeholder="Name">
<input id="email" required type="email" placeholder="Email">
<textarea id="msg" required placeholder="Project"></textarea>
<button>Send</button>
<div class="success" id="success">Opening email...</div>
</form>
</section>

<div class="lightbox" id="lightbox"><img id="lightbox-img"></div>

<script>

/* FILTER */
document.querySelectorAll(".filter-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
let f=btn.dataset;
document.querySelectorAll(".item").forEach(i=>{
i.classList.toggle("hide",!(f.data==="all"||i.classList.contains(f.data)));
});
};
});

/* LIGHTBOX */
document.querySelectorAll(".item img").forEach(img=>{
img.onclick=()=>{
lightbox.style.display="flex";
lightboxImg.src=img.src;
};
});
lightbox.onclick=()=>lightbox.style.display="none";

/* EMAIL */
function sendEmail(e){
e.preventDefault();
let n=name.value,e1=email.value,m=msg.value;
window.location.href=`mailto:rainiercasas28@gmail.com?subject=Booking ${n}&body=${m} (${e1})`;
success.style.display="block";
}

</script>

</body>
</html>
